# Linux root-owned privileged IPMI sensor mapping for power-logger-ipmi-readings
# Install to:
#   /etc/power-logger-ipmi.conf
#
# Ownership/mode:
#   root:wheel
#   600
#
# Strict format:
#   * exact KEY=value lines only
#   * supported keys:
#       POWER_SENSOR_NAME
#       FAN_SENSOR_PREFIX
#   * no quotes, no shell syntax, no regex, no globs
#   * duplicate keys are rejected
#   * unknown keys are rejected
POWER_SENSOR_NAME=Power Meter
FAN_SENSOR_PREFIX=Fan Block
